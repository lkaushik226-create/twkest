// Hash function (DJB2 algorithm - one-way hash)
const hash=s=>{
    if(!s) return '';
    let h=0;
    for(let i=0;i<s.length;i++){
        h=((h<<5)-h)+s.charCodeAt(i);
        h|=0;
    }
    return(h>>>0).toString(16);
}

    return createDefaultData();
};

/* ═══════════════════════════════════════════════════════════════════════
   MAIN APP COMPONENT
═══════════════════════════════════════════════════════════════════════ */
function App(){
    const[data,setData]=useState(loadData);
    const[page,setPage]=useState('home');
    const[user,setUser]=useState(null);
    const[cart,setCart]=useState([]);
    const[isAdmin,setIsAdmin]=useState(false);
    const[adminAuth,setAdminAuth]=useState(false);
    const[modal,setModal]=useState(null);
    const[loading,setLoading]=useState(false);
    
    // Auto-save data (debounced)
    useEffect(()=>{
        const timer=setTimeout(()=>{
            try{
                localStorage.setItem('thrive_data_v2',encrypt(data));
            }catch(e){console.error('Save error:',e);}
        },1000);
        return()=>clearTimeout(timer);
    },[data]);
    
    // Session timeout (30 min auto-logout)
    useEffect(()=>{
        if(adminAuth){
            const timer=setTimeout(()=>{
                setAdminAuth(false);
                alert('Session expired. Please login again.');
            },1800000); // 30 minutes
            return()=>clearTimeout(timer);
        }
    },[adminAuth]);
    
    const updateData=(key,value)=>setData(p=>({...p,[key]:value}));
    const updateConfig=(patch)=>setData(p=>({...p,config:{...p.config,...patch}}));
    
    // Cart management
    const addToCart=item=>{
        setCart(prev=>{
            const existing=prev.find(i=>i.id===item.id);
            if(existing){
                return prev.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i);
            }
            return[...prev,{...item,qty:1}];
        });
    };
    const removeFromCart=id=>setCart(prev=>prev.filter(i=>i.id!==id));
    const updateQty=(id,delta)=>setCart(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+delta)}:i));
    const clearCart=()=>setCart([]);
    
    const cartCount=cart.reduce((sum,item)=>sum+item.qty,0);
    const cartTotal=cart.reduce((sum,item)=>sum+(item.price*item.qty),0);
    
    // Activity logging
    const logActivity=(action,details='')=>{
        const log={
            id:Date.now(),
            timestamp:new Date().toISOString(),
            action,
            details,
            user:user?user.email:'Anonymous',
            ip:'Client-side'
        };
        updateData('activityLog',[log,...(data.activityLog||[]).slice(0,999)]);
    };
    
    const ctx={
        data,setData,updateData,updateConfig,
        page,setPage,
        user,setUser,
        cart,addToCart,removeFromCart,updateQty,clearCart,cartCount,cartTotal,
        isAdmin,setIsAdmin,
        adminAuth,setAdminAuth,
        modal,setModal,
        loading,setLoading,
        logActivity
    };
    
    return(
        <AppContext.Provider value={ctx}>
            {isAdmin?(
                adminAuth?<AdminPanel/>:<AdminLogin/>
            ):(
                <PublicWebsite/>
            )}
            {modal==='auth'&&<AuthModal/>}
            {modal==='cart'&&<CartModal/>}
            {modal==='checkout'&&<CheckoutModal/>}
            {modal==='session'&&<SessionBookingModal/>}
        </AppContext.Provider>
    );
}

/* ═══════════════════════════════════════════════════════════════════════
   ADMIN LOGIN (Hidden, Secure Access)
═══════════════════════════════════════════════════════════════════════ */
const AdminLogin=()=>{
    const{setAdminAuth,logActivity}=useApp();
    const[credentials,setCredentials]=useState({id:'',password:''});
    const[showPw,setShowPw]=useState(false);
    const[error,setError]=useState('');
    const[attempts,setAttempts]=useState(0);
    
    const handleLogin=e=>{
        e.preventDefault();
        setError('');
        
        // Rate limiting (max 5 attempts)
        if(attempts>=5){
            setError('Too many attempts. Please try again later.');
            return;
        }
        
        if(checkAdmin(credentials.id,credentials.password)){
            setAdminAuth(true);
            logActivity('Admin login successful',credentials.id);
        }else{
            setAttempts(p=>p+1);
            setError('Invalid credentials');
            logActivity('Failed admin login attempt',credentials.id);
            setCredentials({...credentials,password:''});
        }
    };
    
    return(
        <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#1a472a,#0a1f11)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <div className="card" style={{maxWidth:460,width:'100%',padding:48}}>
                <div style={{textAlign:'center',marginBottom:32}}>
                    <div style={{fontSize:64,marginBottom:16}}>🔒</div>
                    <h2 style={{fontSize:26,marginBottom:8}}>Admin Portal</h2>
                    <p style={{color:'#666',fontSize:14}}>Authorized access only</p>
                </div>
                <form onSubmit={handleLogin}>
                    <div style={{marginBottom:16}}>
                        <label>Email or Mobile</label>
                        <input
                            type="text"
                            value={credentials.id}
                            onChange={e=>setCredentials({...credentials,id:e.target.value})}
                            placeholder="Enter your ID"
                            required
                            autoComplete="username"
                        />
                    </div>
                    <div style={{marginBottom:24}}>
                        <label>Password</label>
                        <div style={{position:'relative'}}>
                            <input
                                type={showPw?'text':'password'}
                                value={credentials.password}
                                onChange={e=>setCredentials({...credentials,password:e.target.value})}
                                placeholder="Enter password"
                                required
                                autoComplete="current-password"
                                style={{paddingRight:50}}
                            />
                            <button
                                type="button"
                                onClick={()=>setShowPw(!showPw)}
                                style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:20}}
                            >
                                {showPw?'🙈':'👁️'}
                            </button>
                        </div>
                    </div>
                    {error&&<div style={{padding:12,background:'#fee2e2',borderRadius:10,color:'#dc2626',fontSize:14,marginBottom:16}}>{error}</div>}
                    <button type="submit" className="btn btn-primary" style={{width:'100%',fontSize:16}}>
                        Login to Dashboard
                    </button>
                </form>
                <div style={{marginTop:24,padding:16,background:'#f0fdf4',borderRadius:12,fontSize:13,color:'#166534',lineHeight:1.7}}>
                    <strong>Security Notice:</strong><br/>
                    All login attempts are logged. Contact administrator for credentials.
                </div>
            </div>
        </div>
    );
};

const AuthModal=()=>{
    const{setModal,data,updateData,setUser,logActivity}=useApp();
    const[mode,setMode]=useState('login');
    const[showPw,setShowPw]=useState(false);
    const[form,setForm]=useState({name:'',email:'',mobile:'',password:'',confirm:''});
    const[pwValidation,setPwValidation]=useState({valid:false,score:0,message:'',checks:{}});
    
    useEffect(()=>{
        if(form.password){
            setPwValidation(validatePassword(form.password));
        }
    },[form.password]);
    
    const handleLogin=e=>{
        e.preventDefault();
        const user=data.users.find(u=>u.email===form.email&&decrypt(u._pw)===form.password);
        if(user){
            setUser(user);
            setModal(null);
            logActivity('User login',form.email);
            alert(`Welcome back, ${user.name}!`);
        }else{
            alert('Invalid email or password');
        }
    };
    
    const handleRegister=e=>{
        e.preventDefault();
        if(!pwValidation.valid){
            alert(pwValidation.message);
            return;
        }
        if(form.password!==form.confirm){
            alert('Passwords do not match');
            return;
        }
        if(data.users.find(u=>u.email===form.email)){
            alert('Email already registered');
            return;
        }
        const newUser={
            id:Date.now(),
            name:form.name,
            email:form.email,
            mobile:form.mobile,
            _pw:encrypt(form.password),
            joined:new Date().toISOString()
        };
        updateData('users',[...data.users,newUser]);
        setUser(newUser);
        setModal(null);
        logActivity('User registration',form.email);
        alert(`Account created! Welcome ${newUser.name}`);
    };
    
    return(
        <div className="modal" onClick={()=>setModal(null)}>
            <div className="modal-content" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
                <button className="modal-close" onClick={()=>setModal(null)}>×</button>
                <div style={{textAlign:'center',marginBottom:32}}>
                    <div style={{fontSize:56,marginBottom:12}}>{mode==='login'?'👤':'📝'}</div>
                    <h2 style={{fontSize:26}}>{mode==='login'?'Welcome Back':'Create Account'}</h2>
                </div>
                
                {mode==='login'?(
                    <form onSubmit={handleLogin}>
                        <div style={{marginBottom:16}}>
                            <label>Email</label>
                            <input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/>
                        </div>
                        <div style={{marginBottom:24}}>
                            <label>Password</label>
                            <div style={{position:'relative'}}>
                                <input
                                    type={showPw?'text':'password'}
                                    value={form.password}
                                    onChange={e=>setForm({...form,password:e.target.value})}
                                    required
                                    style={{paddingRight:50}}
                                />
                                <button type="button" onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:20}}>
                                    {showPw?'🙈':'👁️'}
                                </button>
                            </div>
                        </div>
                        <button type="submit" className="btn btn-primary" style={{width:'100%',fontSize:16,marginBottom:16}}>
                            Login
                        </button>
                        <div style={{textAlign:'center',fontSize:14}}>
                            <a href="#" onClick={e=>{e.preventDefault();setMode('register');}} style={{color:'var(--primary)',fontWeight:600}}>
                                Create new account
                            </a>
                        </div>
                    </form>
                ):(
                    <form onSubmit={handleRegister}>
                        {[
                            {key:'name',label:'Full Name',type:'text'},
                            {key:'email',label:'Email',type:'email'},
                            {key:'mobile',label:'Mobile',type:'tel'}
                        ].map(field=>(
                            <div key={field.key} style={{marginBottom:16}}>
                                <label>{field.label}</label>
                                <input type={field.type} value={form[field.key]} onChange={e=>setForm({...form,[field.key]:e.target.value})} required/>
                            </div>
                        ))}
                        <div style={{marginBottom:8}}>
                            <label>Password (9+ characters)</label>
                            <input type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/>
                            {form.password&&(
                                <div style={{marginTop:8}}>
                                    <div style={{height:4,background:'#f0f0f0',borderRadius:2,overflow:'hidden'}}>
                                        <div style={{width:`${(pwValidation.score/5)*100}%`,height:'100%',background:pwValidation.score<=2?'#dc2626':pwValidation.score<=4?'#f59e0b':'#10b981',transition:'.3s'}}></div>
                                    </div>
                                    <div style={{fontSize:12,marginTop:4,color:pwValidation.valid?'#10b981':'#dc2626',fontWeight:600}}>
                                        {pwValidation.message}
                                    </div>
                                </div>
                            )}
                        </div>
                        <div style={{marginBottom:24}}>
                            <label>Confirm Password</label>
                            <input type={showPw?'text':'password'} value={form.confirm} onChange={e=>setForm({...form,confirm:e.target.value})} required/>
                        </div>
                        <button type="submit" className="btn btn-primary" style={{width:'100%',fontSize:16,marginBottom:16}}>
                            Create Account
                        </button>
                        <div style={{textAlign:'center',fontSize:14}}>
                            <a href="#" onClick={e=>{e.preventDefault();setMode('login');}} style={{color:'var(--primary)'}}>
                                Already have an account? Login
                            </a>
                        </div>
                    </form>
                )}
            </div>
        </div>
    );
};

const CheckoutModal=()=>{
    const{cart,cartTotal,setModal,user,data,updateData,clearCart,logActivity}=useApp();
    const[step,setStep]=useState(1);
    const[address,setAddress]=useState({name:user?.name||'',mobile:user?.mobile||'',email:user?.email||'',line1:'',line2:'',city:'',state:'',pincode:'',country:'India'});
    const[selectedGateway,setSelectedGateway]=useState(null);
    
    const shipping=cartTotal>=5000?0:150;
    const total=cartTotal+shipping;
    const activeGateways=data.paymentGateways.filter(g=>g.enabled);
    
    const proceedToPayment=e=>{
        e.preventDefault();
        setStep(2);
    };
    
    const completeOrder=()=>{
        if(!selectedGateway){
            alert('Please select a payment method');
            return;
        }
        const order={
            id:Date.now(),
            ...address,
            items:cart,
            subtotal:cartTotal,
            shipping,
            total,
            method:selectedGateway.name,
            status:'Confirmed',
            paymentStatus:'Paid',
            date:new Date().toISOString().split('T')[0],
            timestamp:new Date().toISOString()
        };
        updateData('orders',[...data.orders,order]);
        logActivity('New order',`Order #${order.id} - ₹${total}`);
        clearCart();
        setModal(null);
        alert(`✅ Order Confirmed!\n\nOrder #${order.id}\nTotal: ₹${total.toLocaleString()}\n\nConfirmation sent to ${address.email}`);
    };
    
    return(
        <div className="modal" onClick={()=>setModal(null)}>
            <div className="modal-content" onClick={e=>e.stopPropagation()} style={{maxWidth:680}}>
                <button className="modal-close" onClick={()=>setModal(null)}>×</button>
                
                {/* Progress */}
                <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:32}}>
                    {[1,2].map(s=>(
                        <React.Fragment key={s}>
                            <div style={{flex:1,display:'flex',alignItems:'center',gap:12}}>
                                <div style={{width:32,height:32,borderRadius:'50%',background:step>=s?'var(--primary)':'#e0e0e0',color:step>=s?'#fff':'#666',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14}}>
                                    {s}
                                </div>
                                <span style={{fontWeight:step===s?700:400,color:step>=s?'var(--primary)':'#999'}}>
                                    {s===1?'Address':'Payment'}
                                </span>
                            </div>
                            {s<2&&<div style={{width:40,height:2,background:step>s?'var(--primary)':'#e0e0e0'}}></div>}
                        </React.Fragment>
                    ))}
                </div>
                
                {step===1&&(
                    <form onSubmit={proceedToPayment}>
                        <h3 style={{marginBottom:20}}>Delivery Address</h3>
                        <div className="grid grid-2" style={{marginBottom:16}}>
                            <div><label>Full Name</label><input value={address.name} onChange={e=>setAddress({...address,name:e.target.value})} required/></div>
                            <div><label>Mobile</label><input type="tel" value={address.mobile} onChange={e=>setAddress({...address,mobile:e.target.value})} required/></div>
                        </div>
                        <div style={{marginBottom:16}}><label>Email</label><input type="email" value={address.email} onChange={e=>setAddress({...address,email:e.target.value})} required/></div>
                        <div style={{marginBottom:16}}><label>Address Line 1</label><input value={address.line1} onChange={e=>setAddress({...address,line1:e.target.value})} required/></div>
                        <div style={{marginBottom:16}}><label>Address Line 2</label><input value={address.line2} onChange={e=>setAddress({...address,line2:e.target.value})}/></div>
                        <div className="grid grid-3" style={{marginBottom:16}}>
                            <div><label>City</label><input value={address.city} onChange={e=>setAddress({...address,city:e.target.value})} required/></div>
                            <div><label>State</label><input value={address.state} onChange={e=>setAddress({...address,state:e.target.value})} required/></div>
                            <div><label>Pincode</label><input value={address.pincode} onChange={e=>setAddress({...address,pincode:e.target.value})} required/></div>
                        </div>
                        <button type="submit" className="btn btn-primary" style={{width:'100%',fontSize:16}}>
                            Continue to Payment
                        </button>
                    </form>
                )}
                
                {step===2&&(
                    <div>
                        <h3 style={{marginBottom:20}}>Select Payment Method</h3>
                        {activeGateways.length===0?(
                            <div style={{padding:20,background:'#fff3cd',borderRadius:12,color:'#856404',textAlign:'center'}}>
                                No payment methods enabled. Contact administrator.
                            </div>
                        ):(
                            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12,marginBottom:24}}>
                                {activeGateways.map(gw=>(
                                    <button
                                        key={gw.id}
                                        onClick={()=>setSelectedGateway(gw)}
                                        style={{
                                            padding:16,
                                            border:`2px solid ${selectedGateway?.id===gw.id?'var(--primary)':'#e0e0e0'}`,
                                            borderRadius:12,
                                            background:selectedGateway?.id===gw.id?'#f0fdf4':'#fff',
                                            cursor:'pointer',
                                            textAlign:'center',
                                            transition:'.2s'
                                        }}
                                    >
                                        <div style={{fontSize:32,marginBottom:8}}>{gw.icon}</div>
                                        <div style={{fontSize:13,fontWeight:600,color:selectedGateway?.id===gw.id?'var(--primary)':'#555'}}>{gw.name}</div>
                                    </button>
                                ))}
                            </div>
                        )}
                        <div style={{padding:16,background:'#f0fdf4',borderRadius:12,marginBottom:20}}>
                            <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:700}}>
                                <span>Total to Pay</span>
                                <span style={{color:'var(--primary)'}}>₹{total.toLocaleString()}</span>
                            </div>
                        </div>
                        <button className="btn btn-primary" style={{width:'100%',fontSize:16}} onClick={completeOrder} disabled={!selectedGateway}>
                            🔒 Pay ₹{total.toLocaleString()} Securely
                        </button>
                    </div>
                )}
            </div>
        </div>
    );
};

const SessionBookingModal=()=>{
    const{setModal,data,updateData,logActivity}=useApp();
    const[form,setForm]=useState({name:'',email:'',mobile:'',organisation:'',designation:'',officeAddress:'',enquiryType:'',requiredBy:'',message:''});
    const[submitted,setSubmitted]=useState(false);
    
    const handleSubmit=e=>{
        e.preventDefault();
        const session={
            ...form,
            id:Date.now(),
            date:new Date().toISOString().split('T')[0],
            status:'pending'
        };
        updateData('sessions',[...data.sessions,session]);
        logActivity('New session booking',`${form.name} - ${form.enquiryType}`);
        setSubmitted(true);
        setTimeout(()=>{setModal(null);setSubmitted(false);},3000);
    };
    
    return(
        <div className="modal" onClick={()=>setModal(null)}>
            <div className="modal-content" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
                <button className="modal-close" onClick={()=>setModal(null)}>×</button>
                {submitted?(
                    <div style={{textAlign:'center',padding:'40px 20px'}}>
                        <div style={{fontSize:72,marginBottom:20}}>✅</div>
                        <h2>Session Request Sent!</h2>
                        <p style={{color:'#666',marginTop:12}}>We will contact you within 24 hours to confirm your session.</p>
                    </div>
                ):(
                    <>
                        <div style={{textAlign:'center',marginBottom:28}}>
                            <div style={{fontSize:56,marginBottom:12}}>📅</div>
                            <h2>Book a Session</h2>
                            <p style={{color:'#666',marginTop:8,fontSize:14}}>Fill in your details and we will get back to you</p>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="grid grid-2" style={{marginBottom:16}}>
                                <div><label>Full Name *</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div>
                                <div><label>Mobile *</label><input type="tel" value={form.mobile} onChange={e=>setForm({...form,mobile:e.target.value})} required/></div>
                            </div>
                            <div style={{marginBottom:16}}><label>Email *</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
                            <div className="grid grid-2" style={{marginBottom:16}}>
                                <div><label>Organisation</label><input value={form.organisation} onChange={e=>setForm({...form,organisation:e.target.value})}/></div>
                                <div><label>Designation</label><input value={form.designation} onChange={e=>setForm({...form,designation:e.target.value})}/></div>
                            </div>
                            <div style={{marginBottom:16}}><label>Office Address</label><textarea rows={2} value={form.officeAddress} onChange={e=>setForm({...form,officeAddress:e.target.value})}/></div>
                            <div className="grid grid-2" style={{marginBottom:16}}>
                                <div>
                                    <label>Service Type *</label>
                                    <select value={form.enquiryType} onChange={e=>setForm({...form,enquiryType:e.target.value})} required>
                                        <option value="">Select...</option>
                                        {data.enquiryTypes.map(t=><option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div><label>When do you need this? *</label><input type="date" value={form.requiredBy} onChange={e=>setForm({...form,requiredBy:e.target.value})} required min={new Date().toISOString().split('T')[0]}/></div>
                            </div>
                            <div style={{marginBottom:24}}><label>Additional Message</label><textarea rows={3} value={form.message} onChange={e=>setForm({...form,message:e.target.value})}/></div>
                            <button type="submit" className="btn btn-primary" style={{width:'100%',fontSize:16}}>
                                Submit Session Request
                            </button>
                        </form>
                    </>
                )}
            </div>
        </div>
    );
};

    if (e.key === 'Tab') {
        // Trap focus in modals
        const activeModal = document.querySelector('.modal[style*="display"]');

            const focusable = activeModal.querySelectorAll('button, input, select, textarea, a[href]');

});

// Global Error Tracking

        source: event.filename,

        column: event.colno,
        error: event.error?.stack,
        timestamp: new Date().toISOString()
    };
    
    // Log to console
    console.error('Global Error:', errorData);

});

// Performance Monitoring
window.addEventListener('load', () => {
    if (window.performance && window.performance.timing) {
        const perfData = window.performance.timing;
        const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
        const domReadyTime = perfData.domContentLoadedEventEnd - perfData.navigationStart;
        const ttfb = perfData.responseStart - perfData.navigationStart;
        
        console.log('Performance Metrics:', {
            'Page Load Time': pageLoadTime + 'ms',
            'DOM Ready Time': domReadyTime + 'ms',
            'Time to First Byte': ttfb + 'ms'
        });
        
        // Send to analytics (uncomment when ready)
        // if (window.gtag) {
        //     gtag('event', 'timing_complete', {
        //         name: 'load',
        //         value: pageLoadTime,
        //         event_category: 'Performance'
        //     });
        // }
    }
    
    // Core Web Vitals
    if ('PerformanceObserver' in window) {
        // Largest Contentful Paint
        new PerformanceObserver((list) => {
            const entries = list.getEntries();
            const lastEntry = entries[entries.length - 1];
            console.log('LCP:', lastEntry.renderTime || lastEntry.loadTime);
        }).observe({entryTypes: ['largest-contentful-paint']});
        
        // First Input Delay
        new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
                console.log('FID:', entry.processingStart - entry.startTime);
            }
        }).observe({entryTypes: ['first-input']});
    }
});
